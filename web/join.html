<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Group — Settly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { text-align: center; max-width: 400px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .info { background: #f5f5f5; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .label { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
    .value { font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-bottom: 16px; }
    .value:last-child { margin-bottom: 0; }
    .btn { display: block; background: #111; color: #fff; text-decoration: none; padding: 16px 32px; border-radius: 12px; font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .btn-secondary { background: #f5f5f5; color: #111; border: 1px solid #e5e5e5; }
    .note { color: #999; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Settly</h1>
    <p class="subtitle">You've been invited to join a group</p>

    <div class="info">
      <div class="label">Group ID</div>
      <div class="value" id="groupId">—</div>
      <div class="label">Invite Code</div>
      <div class="value" id="inviteCode">—</div>
    </div>

    <a class="btn" id="openApp" href="#">Open in Settly</a>

    <p class="note">Don't have Settly? Open the app, tap "Join Group", and enter the details above.</p>
  </div>

  <script>
    const parts = window.location.pathname.split('/').filter(Boolean);
    // URL: /join/{groupId}/{inviteCode}
    const groupId = parts[1] || '';
    const inviteCode = decodeURIComponent(parts[2] || '');

    document.getElementById('groupId').textContent = groupId || '—';
    document.getElementById('inviteCode').textContent = inviteCode || '—';

    const deepLink = `settly://join/${groupId}/${encodeURIComponent(inviteCode)}`;
    document.getElementById('openApp').href = deepLink;

    // Try to auto-open the app
    if (groupId && inviteCode) {
      window.location.href = deepLink;
    }
  </script>
</body>
</html>
